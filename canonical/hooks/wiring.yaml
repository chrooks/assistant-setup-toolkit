# Hook Wiring Manifest
#
# Declares which hook scripts under canonical/hooks/ should be registered
# against which lifecycle event in each Assistant Target's settings file.
#
# The Setup Wizard reads this file during `npm run setup` and idempotently
# merges entries into:
# Assistant Home scope writes:
#   - claude-code: ~/.claude/settings.json (under hooks.<event>)
#   - codex-cli:   ~/.codex/hooks.json     (under hooks.<event>)
#                  and asserts [features] hooks = true in ~/.codex/config.toml
#
# Project scope writes:
#   - claude-code: <repo>/.claude/settings.json
#   - codex-cli:   <repo>/.codex/hooks.json
#                  and asserts [features] hooks = true in <repo>/.codex/config.toml
#
# Entries are keyed on the rendered command string for idempotency:
# re-running the wizard never produces duplicate entries, and a hook
# wired by hand earlier won't be re-added.
#
# COMMAND PREFIX: the default rendered command is `node {hook}`. `node` is the
# only command prefix that resolves identically on Mac, bare Windows, and
# Windows+WSL (bare `bash` on Windows is the WSL launcher and fails when no
# distro is installed). Every hook is therefore a `.js` file. Add an explicit
# `command:` only to pass arguments (e.g. `node {hook} done`).
#
# Existing pre-toolkit hooks (session-mode-loader.sh,
# session-mode-cleanup.sh) are intentionally NOT listed here — they are
# wired by hand today with bespoke matcher patterns and we don't want to
# disturb working state. New hooks opt in here.

version: 1

hooks:
  - file: lexicon-reminder.js
    event: UserPromptSubmit
    targets: [claude-code]
    # Optional fields you can add per entry:
    #   matcher: "Bash"          # only honored where the event supports it
    #   timeoutSec: 30
    #   command: "node {hook}"   # default is `node {hook}` where {hook} is the absolute hook path
  # DevOS steering — re-anchors an active run every turn so it survives
  # compaction. Fires only when the current project has a Throughline with
  # status: in_progress; otherwise prints nothing. Claude-code only, mirroring
  # lexicon-reminder (Codex shows additionalContext as transcript noise).
  - file: devos-steering.js
    event: UserPromptSubmit
    targets: [claude-code]
  # Quick-recap completion-status nudge — re-injects every turn so the
  # 🟢/🟡/🔴 status-line convention survives long sessions and compaction.
  # Only work-completing turns get a line; Q&A skips it. Full rules live in
  # canonical/CLAUDE.md. Claude-only, mirroring lexicon-reminder (Codex shows
  # additionalContext as transcript noise).
  - file: quick-recap-reminder.js
    event: UserPromptSubmit
    targets: [claude-code]
  - file: strategic-compact.js
    event: PreToolUse
    matcher: "Edit|Write"
    targets: [claude-code, codex-cli]
  - file: canonical-sync.js
    event: PostToolUse
    matcher: "Edit|Write"
    scope: project
    targets: [claude-code, codex-cli]
  # Session-done / needs-input notifier — macOS banner + Pushover push.
  # Lets Chris run many windows/terminals and get pinged instead of
  # manually checking which session has come back. Secrets stay in a
  # private chmod-600 file (see Next Steps); never committed.
  - file: claude-notify.js
    event: Stop
    targets: [claude-code, codex-cli]
    command: "node {hook} done"
  - file: claude-notify.js
    event: Notification
    targets: [claude-code, codex-cli]
    command: "node {hook} needs-input"
  # Stamps session activity so claude-notify.js can stay quiet while you're
  # actively working and only ping after real silence (quiet-debounce).
  - file: notify-activity.js
    event: UserPromptSubmit
    targets: [claude-code, codex-cli]
  # Recall quiz on cold repo re-open. Offers a /quiz-me on this repo's previous
  # conversation when the last session here ended >6h ago; silent otherwise.
  # Claude-only: it reads the per-project transcript dir, which is Claude-side;
  # Codex SessionStart has no equivalent, so the hook is not wired there.
  - file: quiz-me.js
    event: SessionStart
    targets: [claude-code]
    command: "node {hook}"
  # Tells the assistant what machine it's actually on (hostname, OS, remote
  # SSH or not) every session — informational only, no config, no off-switch.
  # Claude-only, mirroring devos-steering.js/quick-recap-reminder.js (Codex
  # shows additionalContext as transcript noise).
  - file: environment-context.js
    event: SessionStart
    targets: [claude-code]
    command: "node {hook}"
