# Installation Manifest for the Assistant Setup Toolkit
# Lists External Sources the Setup Wizard can fetch and install.
# See CONTEXT.md for domain language definitions.

version: 1
externalSources:
  - id: matt-pocock-skills
    name: Matt Pocock Skills
    kind: skill-pack
    url: https://github.com/mattpocock/skills
    default: false
    targets:
      - claude-code
      - codex-cli
    notes:
      - Includes engineering and productivity skills.
      - Disabled by default — the skills actually used (grill-with-docs,
        improve-codebase-architecture, write-a-skill, writing-great-skills,
        teach, etc.) are vendored into canonical/skills. Re-enable to pull the
        full pack.

  - id: find-skills
    name: find-skills
    kind: skill
    url: https://github.com/vercel-labs/skills/tree/main/skills/find-skills
    default: true
    targets:
      - claude-code
      - codex-cli

  - id: impeccable
    name: Impeccable
    kind: skill
    url: https://github.com/pbakaus/impeccable
    default: true
    targets:
      - claude-code
      - codex-cli
    notes:
      - Install via `npx skills add pbakaus/impeccable`.

  - id: agent-native-visual-plans
    name: Agent-Native Visual Plans
    kind: skill
    url: https://github.com/BuilderIO/skills
    default: false
    targets:
      - claude-code
      - codex-cli
    installCommands:
      claude-code:
        - npx @agent-native/core@latest skills add visual-plan
      codex-cli:
        - npx @agent-native/core@latest skills add visual-plan -a codex
    notes:
      - Provides /visual-plan and /visual-recap (one command installs both).
      - Disabled by default — both skills are vendored into canonical/skills,
        so they install via the normal projection. Re-enable to pull fresh from
        upstream instead.
      - The markdown skills work standalone; the shareable review-link surface
        needs the Agent-Native plan service (VS Code extension or @agent-native
        MCP). See each skill's references/connection.md.

  - id: caveman
    name: Caveman
    kind: plugin
    url: https://github.com/JuliusBrussee/caveman
    default: true
    targets:
      - claude-code
      - codex-cli
    installCommands:
      claude-code:
        - claude plugin marketplace add JuliusBrussee/caveman
        - claude plugin install caveman@caveman
      codex-cli:
        - npx skills add JuliusBrussee/caveman -a codex
    notes:
      - Native plugin install commands from the Caveman README Install section.

  - id: ponytail
    name: Ponytail
    kind: plugin
    url: https://github.com/DietrichGebert/ponytail
    default: true
    targets:
      - claude-code
      - codex-cli
    installCommands:
      claude-code:
        - claude plugin marketplace add DietrichGebert/ponytail
        - claude plugin install ponytail@ponytail
      codex-cli:
        - codex plugin marketplace add DietrichGebert/ponytail
    notes:
      - Decision-ladder plugin that pushes agents to write minimal code
        (commands /ponytail-review and /ponytail-audit).
      - Requires Node.js on PATH for lifecycle hooks; the core skill works
        without it. No API keys or secrets.
      - Claude Code needs the two install commands sent as separate prompts.
      - Codex install finishes interactively under /plugins after the
        marketplace add.

  - id: everything-claude-code
    name: Everything Claude Code
    kind: plugin
    url: https://github.com/affaan-m/everything-claude-code
    default: false
    targets:
      - claude-code
    notes:
      - Disabled by default — it installed ~270 skills, of which only a handful
        were ever used. Those (configure-ecc, consult, deep-research, diagnose,
        note, tdd, design-an-interface, make-interfaces-feel-better,
        security-review, improve-codebase-architecture) are vendored into
        canonical/skills. Re-enable to pull the full plugin.

  - id: codex-plugin-cc
    name: Codex for Claude Code
    kind: plugin
    url: https://github.com/openai/codex-plugin-cc
    default: true
    targets:
      - claude-code
    installWhen:
      assistantTargetExists: claude-code

  - id: playwright-mcp
    name: Playwright MCP
    kind: mcp-server
    url: https://github.com/microsoft/playwright-mcp
    default: false
    targets:
      - claude-code
      - codex-cli
    requiresConfirmation: true

  - id: context7
    name: Context7
    kind: mcp-server
    url: https://github.com/upstash/context7
    default: false
    targets:
      - claude-code
      - codex-cli
    requiresConfirmation: true
    requiredSecrets:
      - CONTEXT7_API_KEY
